<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0d12" />
  <title>Page not found — Mononata</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">
  <link rel="stylesheet" href="/assets/css/style.css?v=29" />
  <style>
    .notfound {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .notfound .card {
      max-width: 520px;
      padding: 36px 28px;
    }
    .notfound .big {
      font-size: clamp(72px, 14vw, 140px);
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1;
      background: linear-gradient(135deg, #7dd3fc, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .notfound h1 { font-size: 22px; margin: 0 0 8px; }
    .notfound p { color: var(--muted); margin: 0 0 22px; }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container">
      <div class="nav-inner">
        <a class="brand" href="/" aria-label="Mononata — Home">
          <img class="brand-logo" src="/assets/img/logo.png" alt="Mononata" width="200" height="56">
        </a>
      </div>
    </div>
  </header>

  <main class="container notfound">
    <div class="card">
      <div class="big" aria-hidden="true">404</div>
      <h1>This page got lost in Bali traffic.</h1>
      <p>The page you're looking for doesn't exist — or it's been moved.</p>
      <div class="cta" style="justify-content:center;">
        <a class="btn primary" href="/">Back to home</a>
        <a class="btn" href="/#contact">Contact us</a>
      </div>
    </div>
  </main>
</body>
</html>
